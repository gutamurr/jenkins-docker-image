name: jenkins-docker
services:
  jenkins:
    build: .
    image: jenkins-docker:lts
    container_name: jenkins

    user: root

    ports:
      - "8000:8080"

    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc

    volumes:
      - /jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
